<!DOCTYPE html>
<html>
<head>
  <title>Interactive Tourism Map Game</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    .map {
      position: relative;
      width: 90%;
      height: 500px;
      margin: 30px auto;
      background: #e3f2fd;
      border-radius: 20px;
      overflow: hidden;
    }

    .spot {
      position: absolute;
      padding: 12px 16px;
      border-radius: 50%;
      background: #ffcc00;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .spot:hover {
      transform: scale(1.2);
    }

    .locked {
      background: grey;
      cursor: not-allowed;
    }

    #langkawi { top: 80px; left: 80px; }
    #paris { top: 120px; right: 120px; }
    #tokyo { bottom: 120px; left: 120px; }
    #dubai { bottom: 80px; right: 80px; }
    #ny { top: 200px; left: 45%; }

    .panel {
      background: white;
      color: black;
      padding: 20px;
      width: 70%;
      margin: auto;
      border-radius: 15px;
    }

    h2 {
      margin-top: 10px;
    }
  </style>

</head>

<body>

<h1>🗺️ Tourism Geography Interactive Map</h1>
<h3>XP: <span id="xp">0</span></h3>

<div class="map">

  <div id="langkawi" class="spot" onclick="visit('langkawi')">🏝️</div>
  <div id="paris" class="spot locked">🗼</div>
  <div id="tokyo" class="spot locked">🏯</div>
  <div id="dubai" class="spot locked">🌆</div>
  <div id="ny" class="spot locked">🗽</div>

</div>

<div class="panel">
  <h2 id="story">👉 Click Langkawi to start your journey</h2>
</div>

<script>
let xp = 0;

function updateXP(points) {
  xp += points;
  document.getElementById("xp").innerHTML = xp;
}

function unlock(id, func) {
  let spot = document.getElementById(id);
  spot.classList.remove("locked");
  spot.onclick = func;
}

function visit(place) {

  if(place === "langkawi") {
    updateXP(10);
    document.getElementById("story").innerHTML =
    " Langkawi: You chose eco-tourism development.";

    unlock("paris", function(){ visit("paris"); });
  }

  else if(place === "paris") {
    updateXP(15);
    document.getElementById("story").innerHTML =
    " Paris: Cultural tourism boosts global image.";

    unlock("tokyo", function(){ visit("tokyo"); });
  }

  else if(place === "tokyo") {
    updateXP(15);
    document.getElementById("story").innerHTML =
    " Tokyo: Technology-driven tourism innovation.";

    unlock("dubai", function(){ visit("dubai"); });
  }

  else if(place === "dubai") {
    updateXP(20);
    document.getElementById("story").innerHTML =
    " Dubai: Luxury tourism and mega development.";

    unlock("ny", function(){ visit("ny"); });
  }

  else if(place === "ny") {
    updateXP(30);
    document.getElementById("story").innerHTML =
    " New York: Global tourism hub mastered!  YOU WIN ";
  }
}
</script>

</body>
</html>
