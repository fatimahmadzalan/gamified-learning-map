<!DOCTYPE html>
<html>
<head>
  <title>Tourism Scenario Game</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #8360c3, #2ebf91);
      color: white;
    }
    .card {
      background: white;
      color: black;
      padding: 25px;
      margin: 40px auto;
      width: 75%;
      border-radius: 15px;
      box-shadow: 0 0 15px gray;
    }
    button {
      padding: 12px 18px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1> Tourism Decision Simulator</h1>
<h3>XP: <span id="xp">0</span></h3>

<div class="card">
  <h2 id="scenario"> Start your journey</h2>

  <button onclick="startGame()">Start Game</button>

  <div id="choices"></div>
</div>

<script>
let xp = 0;

function updateXP(points) {
  xp += points;
  document.getElementById("xp").innerHTML = xp;
}

function startGame() {
  document.getElementById("scenario").innerHTML =
  "Level 1: You are planning tourism in Langkawi. What do you promote?";

  document.getElementById("choices").innerHTML =
  '<button onclick="beach()"> Mass Beach Tourism</button>' +
  '<button onclick="eco()"> Eco Tourism</button>';
}

function beach() {
  updateXP(5);
  document.getElementById("scenario").innerHTML =
  "Tourists increased fast, but pollution rises. Next step?";

  document.getElementById("choices").innerHTML =
  '<button onclick="expand()"> Expand more</button>' +
  '<button onclick="control()"> Control development</button>';
}

function eco() {
  updateXP(10);
  document.getElementById("scenario").innerHTML =
  "Slower growth but sustainable success. Next step?";

  document.getElementById("choices").innerHTML =
  '<button onclick="market()"> Promote globally</button>' +
  '<button onclick="local()"> Focus local tourism</button>';
}

function expand() {
  updateXP(5);
  endGame(" Overdevelopment! Environment damaged.");
}

function control() {
  updateXP(10);
  endGame(" Balanced tourism achieved!");
}

function market() {
  updateXP(10);
  endGame(" International success!");
}

function local() {
  updateXP(8);
  endGame(" Strong domestic tourism!");
}

function endGame(message) {
  document.getElementById("scenario").innerHTML = message + "  GAME OVER";
  document.getElementById("choices").innerHTML =
  '<button onclick="restart()"> Play Again</button>';
}

function restart() {
  xp = 0;
  document.getElementById("xp").innerHTML = xp;
  document.getElementById("scenario").innerHTML = " Start your journey";
  document.getElementById("choices").innerHTML =
  '<button onclick="startGame()">Start Game</button>';
}
</script>

</body>
</html>
