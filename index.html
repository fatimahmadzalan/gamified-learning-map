<!DOCTYPE html>
<html>
<head>
  <title>Tourism Map Game</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #2193b0, #6dd5ed);
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    .map {
      position: relative;
      width: 90%;
      height: 500px;
      margin: 30px auto;
      background: #e0f7fa;
      border-radius: 20px;
    }

    .level {
      position: absolute;
      padding: 15px;
      border-radius: 50%;
      background: #ffcc00;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    .locked {
      background: grey;
      cursor: not-allowed;
    }

    #lvl1 { top: 50px; left: 50px; }
    #lvl2 { top: 150px; left: 200px; }
    #lvl3 { top: 300px; left: 100px; }
    #lvl4 { top: 100px; right: 200px; }
    #lvl5 { top: 250px; right: 100px; }
    #lvl6 { bottom: 50px; left: 45%; }

    .card {
      background: white;
      color: black;
      padding: 20px;
      width: 70%;
      margin: auto;
      border-radius: 15px;
    }
  </style>
</head>

<body>

<h1> Tourism Geography Adventure</h1>
<h3>XP: <span id="xp">0</span></h3>

<div class="map">

  <div id="lvl1" class="level" onclick="play(1)">1</div>
  <div id="lvl2" class="level locked">2</div>
  <div id="lvl3" class="level locked">3</div>
  <div id="lvl4" class="level locked">4</div>
  <div id="lvl5" class="level locked">5</div>
  <div id="lvl6" class="level locked">6</div>

</div>

<div class="card">
  <h2 id="text"> Click Level 1 to start</h2>
</div>

<script>
let xp = 0;

function play(level) {

  if(level === 1) {
    xp += 10;
    unlock(2);
    show(" You learned tourism basics! +10 XP");
  }

  else if(level === 2) {
    xp += 15;
    unlock(3);
    show(" Global tourism mastered! +15 XP");
  }

  else if(level === 3) {
    xp += 15;
    unlock(4);
    show(" Climate impact understood! +15 XP");
  }

  else if(level === 4) {
    xp += 20;
    unlock(5);
    show(" Cultural tourism success! +20 XP");
  }

  else if(level === 5) {
    xp += 20;
    unlock(6);
    show(" Development strategy applied! +20 XP");
  }

  else if(level === 6) {
    xp += 30;
    show(" Sustainability achieved!  YOU WIN ");
  }

  document.getElementById("xp").innerHTML = xp;
}

function unlock(level) {
  let btn = document.getElementById("lvl" + level);
  btn.classList.remove("locked");
  btn.onclick = function(){play(level)};
}

function show(message) {
  document.getElementById("text").innerHTML = message;
}
</script>

</body>
</html>
