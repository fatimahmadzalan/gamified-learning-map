<!DOCTYPE html>
<html>
<head>
  <title>Tourism Simulation Game</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #43cea2, #185a9d);
      color: white;
    }
    .card {
      background: white;
      color: black;
      padding: 20px;
      margin: 40px auto;
      width: 75%;
      border-radius: 15px;
      box-shadow: 0 0 15px gray;
    }
    button {
      padding: 12px 20px;
      margin: 8px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      font-weight: bold;
    }
    .locked {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

<h1> Tourism Simulation Game</h1>
<h3>XP: <span id="xp">0</span></h3>

<div class="card">
  <p>Complete levels to unlock the next stage!</p>

  <button id="lvl1" onclick="completeLevel(1)"> Level 1: Basics</button>
  <button id="lvl2" class="locked"> Level 2: Global</button>
  <button id="lvl3" class="locked"> Level 3: Climate</button>
  <button id="lvl4" class="locked"> Level 4: Culture</button>
  <button id="lvl5" class="locked"> Level 5: Development</button>
  <button id="lvl6" class="locked"> Level 6: Sustainability</button>

  <h2 id="result"> Start Level 1</h2>
</div>

<script>
let xp = 0;

function completeLevel(level) {

  if(level === 1) {
    xp += 10;
    document.getElementById("lvl2").classList.remove("locked");
    document.getElementById("lvl2").onclick = function(){completeLevel(2)};
    document.getElementById("result").innerHTML = " Basics mastered! +10 XP";
  }

  else if(level === 2) {
    xp += 15;
    document.getElementById("lvl3").classList.remove("locked");
    document.getElementById("lvl3").onclick = function(){completeLevel(3)};
    document.getElementById("result").innerHTML = " Global strategy success! +15 XP";
  }

  else if(level === 3) {
    xp += 15;
    document.getElementById("lvl4").classList.remove("locked");
    document.getElementById("lvl4").onclick = function(){completeLevel(4)};
    document.getElementById("result").innerHTML = " Climate decision learned! +15 XP";
  }

  else if(level === 4) {
    xp += 20;
    document.getElementById("lvl5").classList.remove("locked");
    document.getElementById("lvl5").onclick = function(){completeLevel(5)};
    document.getElementById("result").innerHTML = " Culture strategy worked! +20 XP";
  }

  else if(level === 5) {
    xp += 20;
    document.getElementById("lvl6").classList.remove("locked");
    document.getElementById("lvl6").onclick = function(){completeLevel(6)};
    document.getElementById("result").innerHTML = " Development mastered! +20 XP";
  }

  else if(level === 6) {
    xp += 30;
    document.getElementById("result").innerHTML =
    " Sustainability achieved!  YOU WIN ";
  }

  document.getElementById("xp").innerHTML = xp;
}
</script>

</body>
</html>
