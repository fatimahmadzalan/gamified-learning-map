<!DOCTYPE html>
<html>
<head>
  <title>Tourism Simulation Game</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }
    .card {
      background: white;
      padding: 20px;
      margin: 40px auto;
      width: 70%;
      border-radius: 15px;
      box-shadow: 0 0 15px gray;
    }
    button {
      padding: 12px 20px;
      margin: 8px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
    }
    h2 {
      margin-top: 20px;
      color: #333;
    }
  </style>
</head>

<body>

<div class="card">
  <h1> Tourism Simulation Game</h1>
  <p>You are a Tourism Planner in Malaysia. Make smart decisions!</p>

  <h3>Choose a Level:</h3>

  <button onclick="basics()"> Level 1: Basics</button>
  <button onclick="global()"> Level 2: Global</button>
  <button onclick="climate()"> Level 3: Climate</button>
  <button onclick="culture()"> Level 4: Culture</button>
  <button onclick="talc()"> Level 5: Development</button>
  <button onclick="eco()"> Level 6: Sustainability</button>

  <h2 id="result"> Your result will appear here</h2>
</div>

<script>
function basics() {
  document.getElementById("result").innerHTML =
  " You understood tourism system! +10 XP";
}

function global() {
  document.getElementById("result").innerHTML =
  " Smart strategy! Tourist arrivals increased!";
}

function climate() {
  document.getElementById("result").innerHTML =
  " Wrong season! Tourism demand dropped!";
}

function culture() {
  document.getElementById("result").innerHTML =
  " Cultural tourism success! Sustainable growth!";
}

function talc() {
  document.getElementById("result").innerHTML =
  " Destination reached stagnation stage!";
}

function eco() {
  document.getElementById("result").innerHTML =
  " Eco-tourism success! Long-term sustainability achieved!";
}
</script>

</body>
</html>
